<!DOCTYPE html>
<html>
<head>
<title>Reporting</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
}

.sidebar{
  width:220px;
  background:#111827;
  padding:20px;
  height:100vh;
}

.sidebar a{
  display:block;
  color:#ccc;
  padding:10px;
  text-decoration:none;
}

.sidebar a:hover{
  background:#1f2937;
}

.main{
  flex:1;
  padding:20px;
}

table{
  width:100%;
  background:#1e293b;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #333;
}

th{
  color:#4ade80;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>MYPBX</h2>

  <!-- 🔥 FIXED LINKS -->
  <a href="dashboard.html">Dashboard</a>
  <a href="reporting.html">Reporting</a>
</div>

<div class="main">

<h2>📋 Call History</h2>

<table>
<tr>
  <th>Date</th>
  <th>From</th>
  <th>To</th>
  <th>Status</th>
</tr>

<tbody id="t"></tbody>
</table>

</div>

<script>

// 📦 LOAD DATA
let calls = JSON.parse(localStorage.getItem("calls")) || [];

let t = document.getElementById("t");

// ❗ FIX: agar data empty hai
if(calls.length === 0){
  t.innerHTML = "<tr><td colspan='4'>No Call Records Found</td></tr>";
}

// render calls
calls.forEach(c=>{
  t.innerHTML += `
  <tr>
    <td>${c.date}</td>
    <td>${c.from}</td>
    <td>${c.to}</td>
    <td style="color:#4ade80">${c.status}</td>
  </tr>`;
});

</script>

</body>
</html>
