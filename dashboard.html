<!DOCTYPE html>
<html>
<head>
<title>Live PBX Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
  background:#0f172a;
  color:white;
}

/* sidebar */
.sidebar{
  width:220px;
  height:100vh;
  background:#111827;
  padding:20px;
}
.sidebar h2{color:#4ade80;}
.sidebar a{
  display:block;
  color:#ccc;
  padding:10px;
  text-decoration:none;
}

/* main */
.main{flex:1;padding:20px}

/* LIVE */
.live-bar{
  background:#1e293b;
  padding:12px;
  border-radius:10px;
  border:1px solid #4ade80;
  margin-bottom:10px;
}

/* cards */
.cards{display:flex;gap:10px}
.card{
  flex:1;
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  text-align:center;
}
.card h3{color:#4ade80}

/* popup bottom */
.popup{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  display:none;
  border:1px solid #4ade80;
}

/* target panel */
.target{
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:#111827;
  padding:10px;
  display:none;
}
</style>

</head>

<body>

<div class="sidebar">
  <h2>MYPBX</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="reporting.html">Reporting</a>
  <a href="#" onclick="openTarget()">🎯 Targets</a>
</div>

<div class="main">

  <div class="live-bar">
    📞 Live Calls: <b id="live">0</b>
  </div>

  <div class="cards">
    <div class="card"><h3 id="t">0</h3>Total</div>
    <div class="card"><h3 id="i">0</h3>Incoming</div>
    <div class="card"><h3 id="m">0</h3>Missed</div>
    <div class="card"><h3 id="d">0</h3>Duplicate</div>
  </div>

  <canvas id="chart"></canvas>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  📞 Call from <span id="num"></span><br>
  <button onclick="accept()">Accept</button>
  <button onclick="reject()">Reject</button>
</div>

<!-- TARGET PANEL -->
<div class="target" id="targetBox">
  <h3>🎯 Targets</h3>

  <input id="name" placeholder="Name"><br>
  <input id="cap" placeholder="Cap"><br>
  <input id="cc" placeholder="CC"><br>

  <button onclick="addTarget()">Add</button>

  <div id="list"></div>
</div>

<script>

let chart = new Chart(document.getElementById("chart"),{
  type:"line",
  data:{labels:["1","2","3"],datasets:[{data:[10,20,30],borderColor:"#4ade80"}]}
});

let calls = JSON.parse(localStorage.getItem("calls"))||[];
let targets = JSON.parse(localStorage.getItem("targets"))||[];
let currentCall=null;

/* TARGET SYSTEM */
function openTarget(){
  targetBox.style.display="block";
  renderTargets();
}

function addTarget(){
  targets.push({
    name:name.value,
    cap:cap.value,
    cc:cc.value,
    calls:0
  });
  localStorage.setItem("targets",JSON.stringify(targets));
  renderTargets();
}

function renderTargets(){
  list.innerHTML="";
  targets.forEach(t=>{
    list.innerHTML+=`<div style="background:#1e293b;margin:5px;padding:5px">${t.name} (${t.calls})</div>`;
  });
}

/* ROUTING */
function getTarget(){
  if(targets.length==0) return "SYSTEM";
  targets.sort((a,b)=>a.calls-b.calls);
  targets[0].calls++;
  localStorage.setItem("targets",JSON.stringify(targets));
  return targets[0].name;
}

/* LIVE */
setInterval(()=>{

  live.innerText=Math.floor(Math.random()*20);
  t.innerText=Math.floor(Math.random()*200);
  i.innerText=Math.floor(Math.random()*150);
  m.innerText=Math.floor(Math.random()*50);
  d.innerText=Math.floor(Math.random()*400);

  chart.data.datasets[0].data=[Math.random()*100,Math.random()*100,Math.random()*100];
  chart.update();

  currentCall={
    from:"+91"+Math.floor(Math.random()*9999999999),
    to:getTarget(),
    time:new Date().toLocaleString()
  };

  num.innerText=currentCall.from;
  popup.style.display="block";

},6000);

/* ACCEPT */
function accept(){

  calls.push({
    date:currentCall.time,
    from:currentCall.from,
    to:currentCall.to,
    status:"IN CALL"
  });

  localStorage.setItem("calls",JSON.stringify(calls));
  popup.style.display="none";
}

/* REJECT */
function reject(){
  popup.style.display="none";
}

</script>

</body>
</html>
